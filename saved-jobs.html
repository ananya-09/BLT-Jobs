<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saved Jobs - BLT Jobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          },
        },
      };
    </script>
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") document.documentElement.classList.add("dark");
        else if (savedTheme === "light") document.documentElement.classList.remove("dark");
        else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) document.documentElement.classList.add("dark");
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="assets/css/modal.css" />
  </head>
  <body class="min-h-screen bg-gradient-to-b from-slate-50 via-red-50/40 to-white font-sans text-slate-900 antialiased dark:from-gray-900 dark:via-gray-900 dark:to-gray-800 dark:text-gray-100">
    <div id="navbar-placeholder"></div>

    <main class="mx-auto max-w-7xl px-4 pt-28 pb-12 sm:px-6 lg:px-8">
      <header class="mb-8">
        <h1 class="text-3xl font-bold tracking-tight sm:text-4xl dark:text-gray-100 flex items-center gap-3">
          <i class="fa-solid fa-bookmark text-red-600 dark:text-red-400" aria-hidden="true"></i>
          Saved Jobs
        </h1>
        <p class="mt-2 text-slate-600 dark:text-gray-400">Jobs you've bookmarked for later</p>
      </header>

      <div class="mb-6 flex items-center justify-between">
        <div id="savedCount" class="text-sm text-gray-600 dark:text-gray-400">
          <span id="countNumber">0</span> saved jobs
        </div>
        <button
          id="clearAllButton"
          class="hidden rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600"
        >
          <i class="fa-solid fa-trash mr-2" aria-hidden="true"></i>
          Clear All
        </button>
      </div>

      <div id="savedJobsList" class="space-y-4"></div>

      <div id="emptyState" class="hidden rounded-xl border border-slate-200 bg-white p-12 text-center shadow-sm dark:border-gray-700 dark:bg-gray-800">
        <i class="fa-regular fa-bookmark text-6xl text-slate-300 dark:text-gray-600 mb-4" aria-hidden="true"></i>
        <h3 class="text-xl font-semibold text-gray-900 dark:text-gray-100 mb-2">No saved jobs yet</h3>
        <p class="text-slate-600 dark:text-gray-400 mb-6">
          Start bookmarking jobs you're interested in to keep track of them here
        </p>
        <a href="./jobs.html" class="inline-flex items-center gap-2 rounded-lg bg-red-600 px-6 py-3 text-sm font-medium text-white transition hover:bg-red-700">
          <i class="fa-solid fa-search" aria-hidden="true"></i>
          Browse Jobs
        </a>
      </div>
    </main>

    <footer class="mt-16 border-t border-slate-200 bg-white py-8 dark:border-gray-700 dark:bg-gray-900">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col items-center justify-between gap-4 sm:flex-row">
          <p class="text-sm text-slate-600 dark:text-gray-400">
            © 2026 OWASP BLT Jobs. Part of the <a href="https://owasp.org/www-project-bug-logging-tool/" target="_blank" class="font-medium text-red-600 hover:text-red-700 dark:text-red-500 dark:hover:text-red-400">OWASP BLT Project</a>
          </p>
          <div class="flex gap-4">
            <a href="https://github.com/OWASP-BLT/BLT-Jobs" target="_blank" class="text-slate-600 hover:text-red-600 dark:text-gray-400 dark:hover:text-red-500">
              <i class="fa-brands fa-github text-xl" aria-hidden="true"></i>
            </a>
          </div>
        </div>
      </div>
    </footer>

    <script src="assets/js/theme.js"></script>
    <script src="assets/js/modal.js"></script>
    <script src="assets/js/saved-jobs.js"></script>
    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/saved-jobs-page.js"></script>
  </body>
</html>
