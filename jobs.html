<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Listings - BLT Jobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          },
        },
      };
    </script>
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") document.documentElement.classList.add("dark");
        else if (savedTheme === "light") document.documentElement.classList.remove("dark");
        else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) document.documentElement.classList.add("dark");
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  </head>
  <body class="min-h-screen bg-gradient-to-b from-slate-50 via-red-50/40 to-white font-sans text-slate-900 antialiased dark:from-gray-900 dark:via-gray-900 dark:to-gray-800 dark:text-gray-100">
    <div id="navbar-placeholder"></div>

    <main class="mx-auto max-w-7xl px-4 pt-28 pb-12 sm:px-6 lg:px-8">
      <header class="mb-8">
        <h1 class="text-3xl font-bold tracking-tight sm:text-4xl dark:text-gray-100">Job Listings</h1>
        <p class="mt-2 text-slate-600 dark:text-gray-400">Browse open positions in the OWASP BLT community</p>
      </header>

      <div class="mb-6 space-y-4">
        <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
          <h2 class="text-lg font-semibold text-gray-900 dark:text-gray-100">Filter Jobs</h2>
          <a href="./add.html" class="inline-flex items-center gap-2 rounded-lg bg-red-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-red-700">
            <i class="fa-solid fa-plus" aria-hidden="true"></i>
            Post a Job
          </a>
        </div>

        <form id="filtersForm" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6">
          <div class="relative sm:col-span-2 xl:col-span-2">
            <label for="searchInput" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Search</label>
            <i class="fa-solid fa-search absolute left-3 top-9 text-slate-400 dark:text-gray-500" aria-hidden="true"></i>
            <input
              type="text"
              id="searchInput"
              placeholder="Title, company, description..."
              class="w-full rounded-lg border border-slate-200 bg-white py-2 pl-10 pr-4 text-sm shadow-sm transition focus:border-red-600 focus:outline-none focus:ring-1 focus:ring-red-600 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100 dark:placeholder-gray-500"
            />
          </div>

          <div>
            <label for="typeFilter" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Job Type</label>
            <select
              id="typeFilter"
              class="w-full rounded-lg border border-slate-200 bg-white py-2 px-4 text-sm shadow-sm transition focus:border-red-600 focus:outline-none focus:ring-1 focus:ring-red-600 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100"
            >
              <option value="">All Types</option>
              <option value="full-time">Full-time</option>
              <option value="part-time">Part-time</option>
              <option value="contract">Contract</option>
              <option value="internship">Internship</option>
              <option value="freelance">Freelance</option>
            </select>
          </div>

          <div>
            <label for="locationFilter" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Location</label>
            <input
              type="text"
              id="locationFilter"
              placeholder="City, state, or remote"
              class="w-full rounded-lg border border-slate-200 bg-white py-2 px-4 text-sm shadow-sm transition focus:border-red-600 focus:outline-none focus:ring-1 focus:ring-red-600 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100 dark:placeholder-gray-500"
            />
          </div>

          <div>
            <label for="workModeFilter" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Work arrangement</label>
            <select
              id="workModeFilter"
              class="w-full rounded-lg border border-slate-200 bg-white py-2 px-4 text-sm shadow-sm transition focus:border-red-600 focus:outline-none focus:ring-1 focus:ring-red-600 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100"
            >
              <option value="">All arrangements</option>
              <option value="remote">Remote</option>
              <option value="hybrid">Hybrid</option>
              <option value="onsite">On-site</option>
            </select>
          </div>

          <div>
            <label for="salaryFilter" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Compensation</label>
            <select
              id="salaryFilter"
              class="w-full rounded-lg border border-slate-200 bg-white py-2 px-4 text-sm shadow-sm transition focus:border-red-600 focus:outline-none focus:ring-1 focus:ring-red-600 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100"
            >
              <option value="">Any</option>
              <option value="listed">Salary listed</option>
              <option value="none">No salary listed</option>
            </select>
          </div>

          <div>
            <label for="sortSelect" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Sort by</label>
            <select
              id="sortSelect"
              class="w-full rounded-lg border border-slate-200 bg-white py-2 px-4 text-sm shadow-sm transition focus:border-red-600 focus:outline-none focus:ring-1 focus:ring-red-600 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100"
            >
              <option value="newest">Newest listed</option>
              <option value="oldest">Oldest listed</option>
              <option value="title-asc">Title (A–Z)</option>
              <option value="title-desc">Title (Z–A)</option>
              <option value="company-asc">Company (A–Z)</option>
              <option value="company-desc">Company (Z–A)</option>
            </select>
          </div>

          <div class="flex items-end sm:col-span-2 lg:col-span-1 xl:col-span-1">
            <button
              type="button"
              id="clearFiltersButton"
              class="hidden w-full rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600"
            >
              Clear filters
            </button>
          </div>
        </form>

        <div id="resultsSummary" class="hidden text-sm text-gray-600 dark:text-gray-400">
          <span id="resultsCount">0</span><span id="resultsLabel"> jobs found</span>
        </div>

        <div id="emptyState" class="hidden rounded-xl border border-slate-200 bg-white p-8 text-center shadow-sm dark:border-gray-700 dark:bg-gray-800">
          <i class="fa-solid fa-briefcase text-4xl text-slate-300 dark:text-gray-600" aria-hidden="true"></i>
          <h3 class="mt-4 text-lg font-semibold dark:text-gray-100">No jobs found</h3>
          <p id="emptyStateMessage" class="mt-2 text-slate-600 dark:text-gray-400">Try adjusting your search terms or filters</p>
        </div>
      </div>

      <div id="jobList" class="space-y-4"></div>
    </main>

    <footer class="mt-16 border-t border-slate-200 bg-white py-8 dark:border-gray-700 dark:bg-gray-900">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col items-center justify-between gap-4 sm:flex-row">
          <p class="text-sm text-slate-600 dark:text-gray-400">
            © 2026 OWASP BLT Jobs. Part of the <a href="https://owasp.org/www-project-bug-logging-tool/" target="_blank" class="font-medium text-red-600 hover:text-red-700 dark:text-red-500 dark:hover:text-red-400">OWASP BLT Project</a>
          </p>
          <div class="flex gap-4">
            <a href="https://github.com/OWASP-BLT/BLT-Jobs" target="_blank" class="text-slate-600 hover:text-red-600 dark:text-gray-400 dark:hover:text-red-500">
              <i class="fa-brands fa-github text-xl" aria-hidden="true"></i>
            </a>
          </div>
        </div>
      </div>
    </footer>

    <script src="assets/js/theme.js"></script>
    <script src="assets/js/saved-jobs.js"></script>
    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/sanitize.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
