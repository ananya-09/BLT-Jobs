<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seeker Profile - BLT Jobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] },
          },
        },
      };
    </script>
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark")
          document.documentElement.classList.add("dark");
        else if (savedTheme === "light")
          document.documentElement.classList.remove("dark");
        else if (
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches
        )
          document.documentElement.classList.add("dark");
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      /* Prose-like styling using Tailwind-compatible approach */
      .profile-content {
        line-height: 1.75;
        color: #374151;
      }
      .dark .profile-content {
        color: #d1d5db;
      }

      .profile-content h3 {
        font-size: 1.125rem;
        font-weight: 600;
        margin-top: 1.5rem;
        margin-bottom: 0.75rem;
        color: #111827;
      }
      .dark .profile-content h3 {
        color: #f9fafb;
      }

      .profile-content h4 {
        font-size: 1rem;
        font-weight: 600;
        margin-top: 1.25rem;
        margin-bottom: 0.5rem;
        color: #374151;
      }
      .dark .profile-content h4 {
        color: #e5e7eb;
      }

      .profile-content p {
        margin-top: 0.75rem;
        margin-bottom: 0.75rem;
      }
      .profile-content p:first-child {
        margin-top: 0;
      }

      .profile-content ul {
        list-style-type: disc;
        padding-left: 1.5rem;
        margin-top: 0.75rem;
        margin-bottom: 0.75rem;
      }
      .profile-content ul li {
        margin-top: 0.375rem;
        margin-bottom: 0.375rem;
        padding-left: 0.25rem;
      }

      .profile-content ol {
        list-style-type: decimal;
        padding-left: 1.5rem;
        margin-top: 0.75rem;
        margin-bottom: 0.75rem;
      }
      .profile-content ol li {
        margin-top: 0.375rem;
        margin-bottom: 0.375rem;
        padding-left: 0.25rem;
      }

      .profile-content strong {
        font-weight: 600;
        color: #111827;
      }
      .dark .profile-content strong {
        color: #f9fafb;
      }

      .profile-content a {
        color: #dc2626;
        text-decoration: underline;
        text-decoration-color: rgba(220, 38, 38, 0.3);
        text-underline-offset: 2px;
        transition: all 0.2s;
      }
      .profile-content a:hover {
        color: #b91c1c;
        text-decoration-color: rgba(220, 38, 38, 0.6);
      }
      .dark .profile-content a {
        color: #f87171;
      }
      .dark .profile-content a:hover {
        color: #fca5a5;
      }

      .profile-content code {
        background-color: #f3f4f6;
        padding: 0.125rem 0.375rem;
        border-radius: 0.25rem;
        font-size: 0.875em;
        font-family: ui-monospace, monospace;
      }
      .dark .profile-content code {
        background-color: #374151;
      }

      /* Job entry dividers - add spacing between job entries */
      .profile-content > p:has(strong) {
        margin-top: 1.5rem;
        padding-top: 1.25rem;
        border-top: 1px solid #e5e7eb;
      }
      .dark .profile-content > p:has(strong) {
        border-top-color: #374151;
      }
      .profile-content > p:first-child {
        margin-top: 0;
        padding-top: 0;
        border-top: none;
      }
    </style>
  </head>
  <body
    class="min-h-screen bg-gradient-to-b from-slate-50 via-red-50/40 to-white font-sans text-slate-900 antialiased dark:from-gray-900 dark:via-gray-900 dark:to-gray-800 dark:text-gray-100"
  >
    <div id="navbar-placeholder"></div>

    <main class="flex-1">
      <div
        id="seekerRoot"
        class="min-h-screen mx-auto max-w-7xl px-4 pt-28 pb-12 sm:px-6 lg:px-8"
      >
        <!-- Loading state; replaced by seeker.js -->
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
          <div class="text-center text-gray-600 dark:text-gray-300">
            <svg
              class="w-10 h-10 mx-auto mb-4 animate-spin text-gray-400"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"
              ></path>
            </svg>
            <p class="text-lg">Loading profile…</p>
          </div>
        </div>
      </div>
    </main>

    <footer
      class="mt-16 border-t border-slate-200 bg-white py-8 dark:border-gray-700 dark:bg-gray-900"
    >
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div
          class="flex flex-col items-center justify-between gap-4 sm:flex-row"
        >
          <p class="text-sm text-slate-600 dark:text-gray-400">
            © 2026 OWASP BLT Jobs. Part of the
            <a
              href="https://owasp.org/www-project-bug-logging-tool/"
              target="_blank"
              class="font-medium text-red-600 hover:text-red-700 dark:text-red-500 dark:hover:text-red-400"
              >OWASP BLT Project</a
            >
          </p>
          <div class="flex gap-4">
            <a
              href="https://github.com/OWASP-BLT/BLT-Jobs"
              target="_blank"
              class="text-slate-600 hover:text-red-600 dark:text-gray-400 dark:hover:text-red-500"
            >
              <i class="fa-brands fa-github text-xl" aria-hidden="true"></i>
            </a>
          </div>
        </div>
      </div>
    </footer>

    <script src="assets/js/theme.js"></script>
    <script src="assets/js/saved-jobs.js"></script>
    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/seeker.js"></script>
  </body>
</html>
