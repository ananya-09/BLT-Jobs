name: Job Posting from Link
description: Post a job by pasting a job URL — we scrape it and add the listing automatically
title: '[JOB-LINK] '
labels: ['job-posting-from-link']
body:
  - type: input
    id: job_url
    attributes:
      label: Job URL
      description: Paste the job posting URL
      placeholder: e.g. https://boards.greenhouse.io/company/jobs/12345
    validations:
      required: true
