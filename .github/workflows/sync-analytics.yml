name: Sync Analytics Data

on:
  # Manual trigger with analytics data
  workflow_dispatch:
    inputs:
      analytics_data:
        description: 'Analytics data JSON (from BLTAnalytics.exportAnalytics())'
        required: true
        type: string

  # Scheduled sync (weekly)
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight UTC

jobs:
  sync-analytics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements-scrape.txt

      - name: Update view counts
        id: update_counts
        run: |
          python3 << 'EOF'
          import json
          import os
          from pathlib import Path
          import frontmatter

          analytics_data = json.loads(os.environ.get("ANALYTICS_DATA", "{}"))
          print("Analytics data:", analytics_data)

          jobs_dir = Path.cwd() / "jobs"
          files = [f for f in jobs_dir.iterdir() if f.suffix == ".md" and f.name != "README.md"]

          updated_count = 0

          for file_path in files:
              post = frontmatter.load(str(file_path))
              job_id = file_path.stem

              if job_id in analytics_data:
                  new_count = analytics_data[job_id].get("count", 0)
                  current_count = int(post.metadata.get("views_count", 0) or 0)

                  if new_count > current_count:
                      post.metadata["views_count"] = str(new_count)
                      file_path.write_text(frontmatter.dumps(post), encoding="utf-8")
                      print(f"Updated {job_id}: {current_count} -> {new_count} views")
                      updated_count += 1

          print(f"Updated {updated_count} job(s)")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"updated_count={updated_count}\n")
          EOF
        env:
          ANALYTICS_DATA: ${{ github.event.inputs.analytics_data || '{}' }}

      - name: Rebuild jobs.json
        if: steps.update_counts.outputs.updated_count > 0
        run: python3 scripts/build_jobs.py

      - name: Commit and push changes
        if: steps.update_counts.outputs.updated_count > 0
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add jobs/*.md data/jobs.json
          git commit -m "chore: update job view counts (${{ steps.update_counts.outputs.updated_count }} jobs) [skip ci]"
          git push
