# Build data/jobs.json (from jobs/*.md) and data/seekers.json (from seekers/*.md) on push to main and on PRs.
# If running on main and data/jobs.json changed, commit it back (with [skip ci]).
name: Build jobs

on:
  push:
    branches: [main]
    paths:
      - "jobs/**"
      - "seekers/**"
      - "scripts/build_jobs.py"
      - "scripts/extract_salary.py"
      - "scripts/requirements-scrape.txt"
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "jobs/**"
      - "seekers/**"
      - "scripts/build_jobs.py"
      - "scripts/extract_salary.py"
      - "scripts/requirements-scrape.txt"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements-scrape.txt

      - name: Build jobs JSON
        run: python3 scripts/build_jobs.py

      - name: Validate jobs
        run: python3 scripts/validate_jobs.py

      - name: Commit updated data/jobs.json (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          if [ -n "$(git status --porcelain data/jobs.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/jobs.json data/seekers.json
            git commit -m "chore: regenerate data JSON from markdown"
            git push
          fi
