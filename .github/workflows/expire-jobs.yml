name: Expire stale jobs

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  expire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Remove expired job files
        id: expire
        run: |
          RESULT=$(node scripts/expire-jobs.js)
          echo "$RESULT"
          COUNT=$(echo "$RESULT" | jq -r '.count // 0')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Rebuild jobs data
        if: steps.expire.outputs.count != '0'
        run: npm run build:jobs

      - name: Commit expired jobs and rebuilt data
        if: steps.expire.outputs.count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A jobs data/jobs.json data/seekers.json
          git commit -m "chore: expire stale jobs [skip ci]"
          git push

      - name: No expired jobs
        if: steps.expire.outputs.count == '0'
        run: echo "No expired jobs found."
