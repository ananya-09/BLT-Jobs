# When an issue is opened/edited with a job or seeker label (or with a job URL as the title), create the .md file, push to main, then close the issue.
name: Process issue submissions

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write

jobs:
  job-from-url:
    runs-on: ubuntu-latest
    # Run when: issue has label job-posting-from-link, OR issue was opened/edited with a URL as the title or body (no label needed)
    if: github.event.label.name == 'job-posting-from-link' || ((github.event.action == 'opened' || github.event.action == 'edited') && (startsWith(github.event.issue.title, 'http') || contains(github.event.issue.body, '### Job Posting URL')))
    steps:
      - name: React with eyes to acknowledge
        if: github.event.action == 'opened'
        run: |
          gh api --method POST \
            /repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions \
            -f content=eyes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements-scrape.txt

      - name: Get job URL from issue body or title
        id: url
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 -c "
import os, re, sys
title = os.environ.get('ISSUE_TITLE', '')
body = os.environ.get('ISSUE_BODY', '')
m = re.search(r'### Job Posting URL\s*\n+([^\n]+)', body)
url = (m.group(1).strip() if m else '') or ''
if not url or not url.startswith('http'):
    url = title.strip()
if not url:
    print('No Job URL found in issue body or title', file=sys.stderr)
    sys.exit(1)
if not url.startswith('http'):
    url = 'https://' + url.lstrip('/')
with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
    f.write('url=' + url + '\n')
print('Found URL: ' + url)
"

      - name: Scrape URL and create job file
        id: scrape
        env:
          ISSUE_USER: ${{ github.event.issue.user.login }}
        run: python3 scripts/scrape-job-url.py "${{ steps.url.outputs.url }}"

      - name: Check for duplicate job
        id: duplicate_check
        run: python3 scripts/check_duplicate.py "${{ steps.scrape.outputs.path }}"
        continue-on-error: true

      - name: Comment on duplicate and close
        if: steps.duplicate_check.outcome == 'failure'
        run: |
          RESULT='${{ steps.duplicate_check.outputs.result }}'
          TITLE=$(python3 -c "import json,sys; d=json.loads('$RESULT'); print(d.get('title') or 'Unknown')")
          ORG=$(python3 -c "import json,sys; d=json.loads('$RESULT'); print(d.get('organization') or 'Unknown')")
          EXISTING=$(python3 -c "import json,sys; d=json.loads('$RESULT'); print(d.get('existingFile') or 'unknown')")

          gh issue comment ${{ github.event.issue.number }} --body "This job posting appears to be a duplicate of an existing listing.

          **Duplicate detected:**
          - Title: $TITLE
          - Organization: $ORG
          - Existing file: \`$EXISTING\`

          Please check the [existing job listings](https://jobs.owaspblt.org/jobs.html) before submitting. This issue will be closed."
          gh issue close ${{ github.event.issue.number }} --reason "not_planned"
          rm -f "${{ steps.scrape.outputs.path }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build jobs and seekers JSON
        if: steps.duplicate_check.outcome == 'success'
        run: python3 scripts/build_jobs.py

      - name: Check if job needs manual review
        id: validate
        env:
          JOB_FILE: ${{ steps.scrape.outputs.path }}
        run: |
          NEEDS_REVIEW=$(python3 -c "
import frontmatter, os
post = frontmatter.load(os.environ['JOB_FILE'])
val = post.metadata.get('needs_manual_review', False)
print('true' if (val is True or str(val).lower() == 'true') else 'false')
")
          echo "needs_review=$NEEDS_REVIEW" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Commit and push job file
        if: steps.duplicate_check.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.scrape.outputs.path }}" data/jobs.json data/seekers.json
          git commit -m "chore: add job from issue (quick add) #${{ github.event.issue.number }}"
          git push

      - name: Comment and close issue
        if: steps.duplicate_check.outcome == 'success'
        run: |
          if [ "${{ steps.validate.outputs.needs_review }}" = "true" ]; then
            gh issue comment ${{ github.event.issue.number }} --body " Job added but **needs manual review** (possible scrape failure detected). Please verify the job details at [View on site](https://jobs.owaspblt.org/jobs.html) and update if needed. This issue will be closed."
          else
            gh issue comment ${{ github.event.issue.number }} --body "Job added from URL. Listing: [View on site](https://jobs.owaspblt.org/jobs.html). This issue will be closed."
          fi
          gh issue close ${{ github.event.issue.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  job-form:
    runs-on: ubuntu-latest
    # Run when: issue has label job-posting, OR issue was opened/edited with job form sections (no label needed)
    if: github.event.label.name == 'job-posting' || ((github.event.action == 'opened' || github.event.action == 'edited') && contains(github.event.issue.body, '### Company Name') && contains(github.event.issue.body, '### Job Title'))
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements-scrape.txt

      - name: Write issue body to file
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 -c "import os; open('issue_body.txt', 'w').write(os.environ.get('ISSUE_BODY', ''))"

      - name: Create job file from form
        id: create
        env:
          ISSUE_USER: ${{ github.event.issue.user.login }}
        run: python3 scripts/issue_form_to_job.py < issue_body.txt

      - name: Check for duplicate job
        id: duplicate_check
        run: python3 scripts/check_duplicate.py "${{ steps.create.outputs.path }}"
        continue-on-error: true

      - name: Comment on duplicate and close
        if: steps.duplicate_check.outcome == 'failure'
        run: |
          RESULT='${{ steps.duplicate_check.outputs.result }}'
          TITLE=$(python3 -c "import json,sys; d=json.loads('$RESULT'); print(d.get('title') or 'Unknown')")
          ORG=$(python3 -c "import json,sys; d=json.loads('$RESULT'); print(d.get('organization') or 'Unknown')")
          EXISTING=$(python3 -c "import json,sys; d=json.loads('$RESULT'); print(d.get('existingFile') or 'unknown')")

          gh issue comment ${{ github.event.issue.number }} --body "This job posting appears to be a duplicate of an existing listing.

          **Duplicate detected:**
          - Title: $TITLE
          - Organization: $ORG
          - Existing file: \`$EXISTING\`

          Please check the [existing job listings](https://jobs.owaspblt.org/jobs.html) before submitting. This issue will be closed."
          gh issue close ${{ github.event.issue.number }} --reason "not_planned"
          rm -f "${{ steps.create.outputs.path }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build jobs and seekers JSON
        if: steps.duplicate_check.outcome == 'success'
        run: python3 scripts/build_jobs.py

      - name: Commit and push job file
        if: steps.duplicate_check.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.create.outputs.path }}" data/jobs.json data/seekers.json
          git commit -m "chore: add job from issue #${{ github.event.issue.number }}"
          git push

      - name: Comment and close issue
        if: steps.duplicate_check.outcome == 'success'
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "Job posting added. [View on site](https://jobs.owaspblt.org/jobs.html). This issue will be closed."
          gh issue close ${{ github.event.issue.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  seeker:
    runs-on: ubuntu-latest
    # Run when: issue has label job-seeker, OR issue was opened/edited with seeker form content (no label needed)
    if: github.event.label.name == 'job-seeker' || ((github.event.action == 'opened' || github.event.action == 'edited') && (contains(github.event.issue.body, '**Name:**') || contains(github.event.issue.body, '## Personal Information')))
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements-scrape.txt

      - name: Write issue body to file
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 -c "import os; open('issue_body.txt', 'w').write(os.environ.get('ISSUE_BODY', ''))"

      - name: Create seeker file from form
        id: create
        run: python3 scripts/issue_form_to_seeker.py < issue_body.txt

      - name: Build jobs and seekers JSON
        run: python3 scripts/build_jobs.py

      - name: Commit and push seeker file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.create.outputs.path }}" data/jobs.json data/seekers.json
          git commit -m "chore: add seeker profile from issue #${{ github.event.issue.number }}"
          git push

      - name: Comment and close issue
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "Profile added. [View on site](https://jobs.owaspblt.org/seekers.html). This issue will be closed."
          gh issue close ${{ github.event.issue.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
